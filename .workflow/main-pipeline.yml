version: '1.0'
name: main-pipeline
displayName: Main Pipeline
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - main
stages:
  # ============================================================
  # 阶段一：Node.js 构建
  # ============================================================
  - name: stage-build
    displayName: 构建与发布部署
    strategy: naturally
    trigger: auto
    steps:
      # ----------------------------------------------------------
      # Step 1: 拉取代码 + 安装依赖 + VitePress 构建 + 打包
      # ----------------------------------------------------------
      - step: build@nodejs
        name: build-nodejs
        displayName: Node.js 构建
        nodeVersion: 20.10.0
        commands:
          # 使用国内镜像源加速
          - npm config set registry https://registry.npmmirror.com
          # 安装依赖
          - npm ci
          # VitePress 构建
          - npm run docs:build
          # 进入 dist 目录打包产物为 output.tar.gz
          - cd docs/.vitepress/dist && tar -czf ../../../output.tar.gz .
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - output.tar.gz

      # ----------------------------------------------------------
      # Step 2: 上传制品到 Gitee 制品库
      # ----------------------------------------------------------
      - step: publish@general_artifacts
        name: publish-artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build-nodejs

      # ----------------------------------------------------------
      # Step 3: 发布版本（版本号自动递增）
      # ----------------------------------------------------------
      - step: publish@release_artifacts
        name: publish-release
        displayName: 发布版本
        dependArtifact: output
        version: 1.0.0.0
        autoIncrement: true
        dependsOn: publish-artifacts

      # ----------------------------------------------------------
      # Step 4: 主机部署 → 解压到 /opt/wwwroot
      # ----------------------------------------------------------
      - step: deploy@agent
        name: deploy_agent
        displayName: 部署到服务器
        hostGroupID:
          ID: ali2026
        deployArtifact:
          - source: artifact
            name: output
            target: ~/gitee_go/deploy
            artifactRepository: release
            artifactName: output
            artifactVersion: latest
        script:
          # 确保目标目录存在
          - mkdir -p /opt/wwwroot
          # 清空旧文件（保留隐藏文件如 .htaccess）
          - find /opt/wwwroot -mindepth 1 -not -name '.*' -delete 2>/dev/null || true
          # 解压制品到目标目录
          - tar -xzf ~/gitee_go/deploy/output.tar.gz -C /opt/wwwroot
          # 设置合理的权限
          - chmod -R 755 /opt/wwwroot
          - echo "✅ 部署完成: $(date '+%Y-%m-%d %H:%M:%S') → /opt/wwwroot"
