version: '1.0'
name: main-pipeline
displayName: main-pipeline
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - ''
stages:
  - name: stage-build
    displayName: 构建与发布
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build-nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.18.0
        commands:
          - '# 设置NPM源,提升安装速度'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# 执行编译命令'
          - npm install && npm run docs:build
          - ''
          - '# 打包产物为 output.tar.gz'
          - cd docs/.vitepress/dist && tar -czf ../../../output.tar.gz .
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - docs/.vitepress/dist
              - output.tar.gz
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'
      - step: publish@general_artifacts
        name: publish-artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build-nodejs
      - step: publish@release_artifacts
        name: publish-release
        displayName: 发布
        dependArtifact: output
        version: '1.0.0.0'
        autoIncrement: true
        dependsOn: publish-artifacts
