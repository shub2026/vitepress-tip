version: '1.0'
name: main-pip
displayName: main-pip
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - main
stages:
  - name: stage-build
    displayName: 构建与发布部署
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build-nodejs
        displayName: Nodejs 构建
        nodeVersion: 25.4.0
        commands:
          - '# 设置NPM源,提升安装速度'
          - npm config set registry https://registry.npmmirror.com
          - '# 执行编译命令'
          - npm install
          - npm run docs:build
          - '# 检查构建结果目录'
          - ls -la docs/.vitepress/dist/
          - '# 打包产物为 output.tar.gz'
          - cd docs/.vitepress/dist && tar -czf ../../../output.tar.gz .
          - '# 验证打包结果'
          - cd ../../..
          - ls -la output.tar.gz
          - tar -tzf output.tar.gz
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - output.tar.gz
        strategy: {}
      - step: publish@general_artifacts
        name: publish-artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        strategy: {}
        dependsOn: build-nodejs
      - step: publish@release_artifacts
        name: publish-release
        displayName: 发布
        dependArtifact: output
        version: 1.0.0.0
        autoIncrement: true
        strategy: {}
        dependsOn: publish-artifacts
      - step: deploy@agent
        name: deploy_agent
        displayName: 主机部署
        hostGroupID:
          ID: ali2026
          hostID:
            - ddcb52f3-610e-4d38-bef6-54427fe27014
        deployArtifact:
          - source: artifact
            name: output
            target: ~/gitee_go/deploy
            artifactRepository: release
            artifactName: output
            artifactVersion: latest
        script:
          - '# 检查文件是否存在'
          - ls -la ~/gitee_go/deploy/
          - '# 创建目标目录'
          - mkdir -p /home/admin/vitepress-project
          - '# 清空目标目录'
          - rm -rf /home/admin/vitepress-project/*
          - '# 解压到目标目录'
          - tar -zxvf ~/gitee_go/deploy/output.tar.gz -C /home/admin/vitepress-project
          - '# 设置权限'
          - chmod -R 755 /home/admin/vitepress-project
          - '# 验证解压结果'
          - ls -la /home/admin/vitepress-project/
          - echo "Deploy Success"
        notify: []
        strategy:
          retry: '0'
        dependsOn: publish-release
