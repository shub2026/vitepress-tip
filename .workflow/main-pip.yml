version: '1.0'
name: main-pip
displayName: main-pip
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - main
stages:
  - name: stage-build
    displayName: 构建与发布部署
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build-nodejs
        displayName: Nodejs 构建
        nodeVersion: 25.4.0
        commands:
          - '# 设置NPM源,提升安装速度'
          - npm config set registry https://registry.npmmirror.com
          - '# 执行编译命令(使用npm ci保证依赖一致性)'
          - npm install
          - npm run docs:build
          - '# 检查构建结果目录'
          - ls -la docs/.vitepress/dist/
          - '# 打包产物为 output.tar.gz'
          - tar -czf output.tar.gz -C docs/.vitepress/dist .
          - '# 验证打包结果'
          - ls -la output.tar.gz
          - tar -tzf output.tar.gz
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - output.tar.gz
        caches: []
        strategy: {}
      - step: publish@general_artifacts
        name: publish-artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        strategy: {}
        dependsOn: build-nodejs
      - step: publish@release_artifacts
        name: publish-release
        displayName: 发布
        dependArtifact: output
        version: 1.0.0.0
        autoIncrement: true
        strategy: {}
        dependsOn: publish-artifacts
      - step: deploy@agent
        name: deploy_agent
        displayName: 主机部署
        hostGroupID:
          ID: ali2026
          hostID:
            - ddcb52f3-610e-4d38-bef6-54427fe27014
        deployArtifact:
          - source: artifact
            name: output
            target: /opt/wwwroot
            artifactRepository: release
            artifactName: output
            artifactVersion: latest
        script:
# 1. 确保目标目录存在（-p 参数可递归创建多级目录）
mkdir -p /opt/1panel/www/sites/sntip/index

# 2. 查看目标目录当前状态（便于排查问题）
ls -la /opt/1panel/www/sites/sntip/index

# 3. 将 output.tar.gz 解压到指定目录（-C 后接目标路径）
tar -zxf output.tar.gz -C /opt/1panel/www/sites/sntip/index

# 4. 清理压缩包释放空间
rm -f output.tar.gz

# 5. 递归修改目标目录的权限为 755
chmod -R 755 /opt/1panel/www/sites/sntip/index

# 6. 输出部署成功提示
echo Deploy Success
        notify: []
        strategy:
          retry: '0'
        dependsOn: publish-release
