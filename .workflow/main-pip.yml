version: '1.0'
name: main-pip
displayName: main-pip
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - main
stages:
  - name: stage-build
    displayName: 构建与发布部署
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build-nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.18.0
        commands:
          - '# 设置NPM源,提升安装速度'
          - npm config set registry https://registry.npmmirror.com
          - '# 执行编译命令(使用npm ci保证依赖一致性)'
          - npm ci --prefer-offline --no-audit
          - npm run docs:build
          - '# 检查构建结果目录'
          - ls -la docs/.vitepress/dist/
          - '# 打包产物为 output.tar.gz'
          - tar -czf output.tar.gz -C docs/.vitepress/dist .
          - '# 验证打包结果'
          - ls -la output.tar.gz
          - tar -tzf output.tar.gz
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - output.tar.gz
        strategy: {}
      - step: publish@general_artifacts
        name: publish-artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        strategy: {}
        dependsOn: build-nodejs
      - step: publish@release_artifacts
        name: publish-release
        displayName: 发布
        dependArtifact: output
        version: 1.0.0.0
        autoIncrement: true
        strategy: {}
        dependsOn: publish-artifacts
      - step: deploy@agent
        name: deploy_agent
        displayName: 主机部署
        hostGroupID:
          ID: ali2026
          hostID:
            - ddcb52f3-610e-4d38-bef6-54427fe27014
        deployArtifact:
          - source: artifact
            name: output
            target: ~/gitee_go/deploy
            artifactRepository: release
            artifactName: output
            artifactVersion: latest
        script:
          - set -e
          - '# 检查制品文件是否存在'
          - ls -la ~/gitee_go/deploy/
          - '# 查找实际的制品文件名'
          - 'ARTIFACT_FILE=$(find ~/gitee_go/deploy/ -name "*.tar.gz" -type f | head -1)'
          - 'echo "找到制品文件: $ARTIFACT_FILE"'
          - 'if [ -z "$ARTIFACT_FILE" ]; then echo "错误: 未找到tar.gz制品文件"; exit 1; fi'
          - '# 创建Web服务目标目录'
          - mkdir -p /opt/1panel/apps/openresty/openresty/sites-enabled/vitepress
          - '# 清空目标目录'
          - rm -rf /opt/1panel/apps/openresty/openresty/sites-enabled/vitepress/*
          - '# 解压到Web服务目标目录'
          - tar -zxvf "$ARTIFACT_FILE" -C /opt/1panel/apps/openresty/openresty/sites-enabled/vitepress
          - '# 设置权限'
          - chmod -R 755 /opt/1panel/apps/openresty/openresty/sites-enabled/vitepress
          - '# 验证解压结果'
          - ls -la /opt/1panel/apps/openresty/openresty/sites-enabled/vitepress/
          - echo "Deploy Success"
        notify: []
        strategy:
          retry: '0'
        dependsOn: publish-release
